<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HogwartsMP Character Creator</title>

<!-- In-game character creator UI (React + TS + Vite). Loaded by the framework CEF view;
     controls drive the live player CCC via src/bridge.ts (callEvent). In a plain browser
     the bridge no-ops so the UI stays clickable for design preview. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Spectral:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; height: 100%; }
  *, *::before, *::after { box-sizing: border-box; }
  /* Transparent so the live 3D avatar renders behind the right-hand stage. */
  body { background: transparent; font-family: 'Spectral', Georgia, serif; color: #d5c8a9; }
  input { font-family: 'Spectral', Georgia, serif; }
  input::placeholder { color: #5e553f; }
  @keyframes specks { 0% { transform: translateY(0); opacity: 0; } 30% { opacity: .8; } 100% { transform: translateY(-26px); opacity: 0; } }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(201,162,90,.18); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
